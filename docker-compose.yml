services:
  nexscout:
    build: .
    volumes:
      - "${HOME}/.nexscout:/sandbox/nexscout"
    environment:
      - CAPTCHA_API_KEY
      - GEMINI_API_KEY
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - TAVILY_API_KEY
    depends_on: [ollama]
    command: ["run"]

  ollama:
    image: ollama/ollama
    volumes: [ollama:/root/.ollama]
    profiles: ["local-llm"]

  openclaw:
    image: openclaw/openclaw:latest
    volumes:
      - "${HOME}/.openclaw:/root/.openclaw"
      - "${HOME}/.nexscout:/sandbox/nexscout"
    profiles: ["openclaw"]

volumes:
  ollama:
