# NexScout master profile — fill once; every application is tailored from this.

meta:
  v: 1
  locale: en_US
  updated: 2026-05-20

me:
  legal: Jane Q. Public
  pref: Jane
  email: jane@example.com
  phone: "+1-415-555-0100"
  city: San Francisco
  region: CA
  country: USA
  postcode: "94110"
  address: "123 Main St"
  links:
    li: linkedin.com/in/janepublic
    gh: github.com/janepublic
    web: jane.dev
    portfolio: jane.dev/work

auth:
  authorized: true
  sponsor: false
  permit: USC

pay:
  expect: 165000
  range: [150000, 200000]
  currency: USD
  hourly_note: "divide annual by 2080"

avail:
  start: "Immediately"
  fulltime: true
  contract: false
  notice: 2w

exp:
  years: 7
  edu: "BSc Computer Science"
  current_title: "Senior Software Engineer"
  target_titles:
    - Staff Engineer
    - Senior Backend Engineer
    - Principal Engineer

skills:
  lang:   [Python, TypeScript, Go, SQL, Bash]
  fw:     [FastAPI, React, Django, Next.js]
  infra:  [Docker, Kubernetes, AWS, Terraform, GitHub Actions]
  data:   [Postgres, Redis, Kafka, ClickHouse]
  tools:  [Git, Linux, Vim]

facts:
  companies: [Acme Corp, Globex]
  projects:
    - "Search Indexer (50M docs/day)"
    - "Auth Gateway"
  school: "State University"
  metrics:
    - "reduced p99 by 38%"
    - "10M MAU"
    - "saved $2.1M/yr"

eeo:
  gender: decline
  race: decline
  veteran: not-protected
  disability: decline

search:
  queries:
    - {q: "staff engineer",    tier: 1}
    - {q: "senior backend",    tier: 1}
    - {q: "platform engineer", tier: 2}
    - {q: "infra engineer",    tier: 3}
  locations:
    - {label: "Bay Area",  q: "San Francisco, CA", remote: false}
    - {label: "Remote US", q: "Remote",            remote: true}
  exclude_titles: [intern, "vp", chief, "co-op", clearance]
  hours_old: 72
  min_score: 7
  boards:
    jobspy: [indeed, linkedin, glassdoor, zip_recruiter, google]
    websearch:
      providers: [tavily, brave, duckduckgo, searxng]
      queries_per_day: 200

llm:
  primary: gemini-2.0-flash
  fallback: ollama:llama3.1:70b
  judge: anthropic:claude-haiku-4-5-20251001
  budgets:
    monthly_usd: 30
    daily_calls: 5000

apply:
  workers: 2
  headless: true
  dry_run: false
  max_attempts: 3
  max_per_run: 0
  permitted_atss: [greenhouse, lever, ashby, workday, taleo, icims, smartrecruiters]

captcha:
  # CAPTCHA is OPTIONAL. If api_key is unset the project still runs;
  # jobs requiring a CAPTCHA solve are parked with apply_status='captcha_manual'
  # and surfaced as a pending question for the user to handle manually.
  provider: capsolver
  api_key: "${env:CAPTCHA_API_KEY}"

# Email transport for the ``send_email`` tool (email-only postings).
# If ``host`` is set we use smtplib directly. If ``host`` is empty AND
# ``me.email`` is a @gmail.com address AND ``gmail_password`` (or
# ``smtp.password``) is set, the agent drives a browser-driven Gmail
# compose+login flow instead.
# smtp:
#   host: smtp.gmail.com
#   port: 465
#   user: "${env:GMAIL_USER}"
#   password: "${env:GMAIL_APP_PASSWORD}"
#   use_ssl: true
#   use_tls: false
# gmail_password: "${env:GMAIL_APP_PASSWORD}"

openclaw:
  tick_budget:
    discover_per_engine: 10
    enrich: 20
    score: 50
    tailor: 5
    apply: 3
