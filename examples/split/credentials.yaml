# NexScout secrets — plaintext. Keep private; never commit.
# ===========================================================================
# WARNING: this file holds API keys and passwords in cleartext. It belongs in
# ~/.nexscout/ (outside any git repo) — never commit it. If you keep a copy
# inside a repo, add it to .gitignore. Lock down its permissions:
#   chmod 600 ~/.nexscout/credentials.yaml          # (Linux/macOS)
# Prefer `${env:NAME}` references over inline values so the actual secret stays
# in your shell / secret manager and never lands on disk.
# ===========================================================================
#
# Highest-priority file: deep-merged last, so a secret here overrides the same
# key in settings.yaml or profile.yaml. Leave a value as "" (or omit the line)
# to fall back to the default / env. `${env:NAME}` works here too.
#
# NOTE: OpenClaw channel tokens (Telegram / Discord) are NOT read from this
# file — they come from environment variables only. See settings.yaml ->
# openclaw.channel and docs/openclaw.md.

# CAPTCHA solver key. Optional — leave blank to use the manual-review path.
captcha:
  api_key: "${env:CAPTCHA_API_KEY}"      # or paste the literal key (kept private)

# SMTP password for the `send_email` tool (paired with smtp.* in settings.yaml).
smtp:
  password: "${env:SMTP_PASSWORD}"

# Gmail app-password fallback. Used when smtp.host is empty AND me.email is a
# @gmail.com address: the apply agent drives a browser-driven Gmail login.
gmail_password: "${env:GMAIL_APP_PASSWORD}"

# Web-account / login password the apply agent may need for some ATSs.
password: ""

# Outbound proxy for the apply browser, e.g. http://user:pass@host:port
proxy: ""
