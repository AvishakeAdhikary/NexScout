{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block body %}
<h2>Profile</h2>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<p>Schema version: {{ meta_v }} (current {{ current_v }})
  {% if meta_v != current_v %}<a class="button" href="/profile/migrate">Migrate</a>{% endif %}
</p>
<form method="post" action="/profile">
  <textarea name="yaml_text" rows="40" cols="80">{{ yaml_text }}</textarea>
  <br>
  <button>Save</button>
</form>
{% endblock %}
