{% extends "base.html" %}
{% block title %}Jobs{% endblock %}
{% block body %}
<h2>Jobs ({{ total }})</h2>

<form id="jobs-filter" hx-get="/jobs" hx-target="#jobs-table" hx-swap="outerHTML" hx-trigger="change, submit">
  <label>Min score <input name="min_score" type="number" value="{{ filters.min_score or '' }}"></label>
  <label>Site <input name="site" value="{{ filters.site or '' }}"></label>
  <label>Status
    <select name="status">
      <option value="">any</option>
      <option value="applied" {% if filters.status == "applied" %}selected{% endif %}>applied</option>
      <option value="failed" {% if filters.status == "failed" %}selected{% endif %}>failed</option>
      <option value="pending" {% if filters.status == "pending" %}selected{% endif %}>pending</option>
      <option value="paused" {% if filters.status == "paused" %}selected{% endif %}>paused</option>
    </select>
  </label>
  <label>Sort
    <select name="sort">
      <option value="score" {% if filters.sort == "score" %}selected{% endif %}>score</option>
      <option value="discovered_at" {% if filters.sort == "discovered_at" %}selected{% endif %}>discovered</option>
    </select>
  </label>
</form>

{% include "_jobs_table.html" %}
{% endblock %}
