{% from "_macros.html" import pagination %}
<div id="jobs-results">
  <div class="overflow-x-auto">
    <table id="jobs-table" class="w-full overflow-hidden rounded-xl border border-slate-200 bg-white text-sm dark:border-slate-800 dark:bg-slate-900">
      <thead class="border-b border-slate-200 dark:border-slate-800 text-left text-slate-500 dark:text-slate-400">
        <tr>
          <th class="px-4 py-2 font-medium">Match</th>
          <th class="px-4 py-2 font-medium">Job title</th>
          <th class="px-4 py-2 font-medium">Job site</th>
          <th class="px-4 py-2 font-medium">Status</th>
          <th class="px-4 py-2 font-medium">Found</th>
          <th class="px-4 py-2 text-right font-medium">Next step</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
        {% for row in rows %}
        {% include "_job_row.html" %}
        {% else %}
        <tr><td colspan="6" class="px-4 py-6 text-center text-slate-400">No jobs match these filters yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {{ pagination('/jobs', page, per_page, total, qs=filter_qs, hx_target='#jobs-results') }}
</div>
