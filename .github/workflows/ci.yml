name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project + dev deps
        # python-jobspy is intentionally NOT installed in CI — tests don't need
        # it, and it's the over-pinned package handled separately at runtime.
        run: uv sync --python ${{ matrix.python-version }} --extra dev --extra web

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        # Type errors are tolerated (advisory) and must not fail the matrix on
        # any OS, so use continue-on-error rather than a shell-specific `|| true`.
        continue-on-error: true
        run: uv run mypy src/nexscout/core src/nexscout/llm src/nexscout/scoring

      - name: Pytest
        run: uv run pytest -q
